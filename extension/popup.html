<!doctype html>
<html lang="ru">
  <head>
    <title>AI Media Watch Extension</title>
    <meta charset="UTF-8" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2/dist/tailwind.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body
    class="bg-gray-100 w-96 min-h-screen flex items-center justify-center p-4"
  >
    <div class="bg-white shadow-xl rounded-2xl p-6 w-full">
      <h1 class="text-2xl font-bold text-gray-800 text-center">
        AI Media Watch
      </h1>

      <div class="space-y-3 my-3">
        <div class="relative">
          <!-- label на границе -->
          <label
            class="absolute -top-2 left-3 bg-white px-1 text-xs text-gray-500"
          >
            Ссылка на опасное видео
          </label>

          <input
            id="link-input"
            name="link-input"
            type="text"
            placeholder="https://example.com/video"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition shadow-sm"
          />
        </div>
      </div>
      <div>
        <button
          id="grabBtn"
          class="w-full bg-blue-600 hover:bg-blue-700 active:scale-[0.99] text-white font-semibold py-3 rounded-xl transition shadow-md"
        >
          Отправить
        </button>
      </div>
      <label class="flex items-center space-x-2 mt-4 relative">
        <input id="toggle-collect" type="checkbox" class="w-4 h-4" />

        <span class="text-sm text-gray-700 flex items-center">
          Отправлять видео на проверку
          <span class="relative ml-1 group">
            <i class="fa-solid fa-circle-info text-gray-400 cursor-help"></i>

            <div
              class="absolute right-full mr-2 bottom-full -translate-y-1/2 w-52 text-xs text-white bg-gray-800 px-3 py-2 rounded-lg opacity-0 group-hover:opacity-100 transition pointer-events-none z-50"
            >
              Видео, которы Вы посмотрите в Shorts, Reels и TikTok будут
              автоматически отправлены на аналитику.
            </div>
          </span>
        </span>
      </label>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
